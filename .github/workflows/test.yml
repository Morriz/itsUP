name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.1
        with:
          enable-cache: true

      - name: Install all dependencies
        run: make install

      - name: Configure git
        run: |
          git config --global user.email "test@test.com"
          git config --global user.name "Test User"

      - name: Run checks
        run: |
          make format
          make lint
          make test-all
