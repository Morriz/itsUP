name: Build image

# Reusable container build+push hub for the containerized fleet.
# Callers keep only their trigger (branches + path filter) and image name:
#
#   jobs:
#     build:
#       uses: Morriz/itsUP/.github/workflows/build.yml@main
#       with:
#         image-name: morriz/ai-assistant
#       secrets: inherit
#
# Defaults to a GitHub-hosted arm64 runner. Pass runs-on only when a build
# genuinely needs a self-hosted host (e.g. host-local credentials).

on:
  workflow_call:
    inputs:
      image-name:
        description: Image repository, e.g. morriz/ai-assistant
        type: string
        required: true
      runs-on:
        description: Runner label(s); default is the GitHub-hosted arm64 runner
        type: string
        required: false
        default: ubuntu-24.04-arm
      registry:
        type: string
        required: false
        default: docker.io
      registry-user:
        type: string
        required: false
        default: morriz
      context:
        type: string
        required: false
        default: .
    secrets:
      DOCKER_TOKEN:
        required: true
      DATABASE_URL:
        description: Optional BuildKit secret forwarded to the build (some apps need it at build time)
        required: false

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry-user }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          network: host
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: ${{ secrets.DATABASE_URL && format('DATABASE_URL={0}', secrets.DATABASE_URL) || '' }}
