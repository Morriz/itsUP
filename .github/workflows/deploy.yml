name: Deploy

# Thin caller that dogfoods the shared reconcile workflow — no VPN/SSH plumbing
# of its own. Runs after the Test workflow succeeds; with the APP_NAME secret set
# this triggers a targeted update-upstream on the host (see reconcile.yml).

on:
  workflow_run:
    workflows: ['Test']
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/reconcile.yml
    secrets: inherit
