name: Reconcile

# Shared reusable deploy workflow: holds the VPN + SSH plumbing in one place so
# no caller repo copies it. Callers pass credentials with `secrets: inherit`;
# behaviour is selected by whether the caller set the APP_NAME secret:
#   - APP_NAME set   -> GET /update-upstream/<APP_NAME>: pull that app's fresh
#     image and roll it out. App repos call this after their build-and-push.
#   - APP_NAME unset -> POST /reconcile: pull the projects + secrets config repos
#     and apply the whole stack. The projects and secrets repos call this on push.

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Check out itsUP (public) for the committed VPN client config, so the
      # caller repo does not need to ship client.ovpn itself.
      - name: Checkout itsUP (VPN config)
        uses: actions/checkout@v6
        with:
          repository: Morriz/itsUP

      - name: Install OpenVPN
        run: |
          sudo apt update
          sudo apt install -y openvpn openvpn-systemd-resolved

      - name: Require VPN peer secret
        env:
          OVPN_HOST: ${{ secrets.OVPN_HOST }}
        run: |
          if [ -z "$OVPN_HOST" ]; then
            echo '::error::OVPN_HOST is not set in this repository; the OpenVPN peer address would be omitted.'
            exit 1
          fi

      - name: Connect to VPN
        id: vpn
        uses: Morriz/github-openvpn-connect-action@728a3c0657b657ab483cbcbdab7d8f5099d70601 # v3
        with:
          config_file: .github/workflows/client.ovpn
          host: ${{ secrets.OVPN_HOST }}
          ca: '${{ secrets.OVPN_CA }}'
          cert: '${{ secrets.OVPN_CERT }}'
          client_key: '${{ secrets.OVPN_USER_KEY }}'
          # Only consulted for callers whose client key is encrypted (itsUP's
          # own); the action skips askpass entirely when the secret is empty.
          client_pass: '${{ secrets.OVPN_USER_PASS }}'
          tls_auth_key: '${{ secrets.OVPN_TLS_AUTH_KEY }}'

      - name: Dump OpenVPN log on failure
        if: failure() && steps.vpn.outcome == 'failure'
        run: sudo cat openvpn.log

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          API_KEY: ${{ secrets.API_KEY }}
          APP_NAME: ${{ secrets.APP_NAME }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: '${{ secrets.SSH_PRIVATE_KEY }}'
          passphrase: '${{ secrets.SSH_PASSPHRASE }}'
          envs: API_KEY,APP_NAME
          script: |
            if [ -n "$APP_NAME" ]; then
              curl -f "http://127.0.0.1:8888/update-upstream/$APP_NAME" -H "Authorization: Bearer $API_KEY"
            else
              curl -f -X POST 'http://127.0.0.1:8888/reconcile' -H "Authorization: Bearer $API_KEY"
            fi
            exit
