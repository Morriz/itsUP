name: Reconcile

# Shared reusable deploy workflow: holds the VPN + SSH plumbing in one place so
# no caller repo copies it. Callers pass credentials with `secrets: inherit`;
# behaviour is selected by whether the caller set the APP_NAME secret:
#   - APP_NAME set   -> GET /update-upstream/<APP_NAME>: pull that app's fresh
#     image and roll it out. App repos call this after their build-and-push.
#   - APP_NAME unset -> POST /reconcile: pull the projects + secrets config repos
#     and apply the whole stack. The projects and secrets repos call this on push.

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Check out itsUP (public) for the committed VPN client config, so the
      # caller repo does not need to ship client.ovpn itself.
      - name: Checkout itsUP (VPN config)
        uses: actions/checkout@v6
        with:
          repository: Morriz/itsUP

      - name: Install OpenVPN
        run: |
          sudo apt update
          sudo apt install -y openvpn openvpn-systemd-resolved

      - name: Connect to VPN
        uses: Morriz/github-openvpn-connect-action@v3
        with:
          config_file: .github/workflows/client.ovpn
          host: ${{ secrets.API_HOST }}
          ca: '${{ secrets.OVPN_CA }}'
          cert: '${{ secrets.OVPN_CERT }}'
          client_key: '${{ secrets.OVPN_USER_KEY }}'
          tls_auth_key: '${{ secrets.OVPN_TLS_AUTH_KEY }}'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: '${{ secrets.SSH_PRIVATE_KEY }}'
          passphrase: '${{ secrets.SSH_PASSPHRASE }}'
          script: |
            if [ -n '${{ secrets.APP_NAME }}' ]; then
              curl -v -f 'https://${{ secrets.API_HOST }}/update-upstream/${{ secrets.APP_NAME }}' -H 'Authorization: Bearer ${{ secrets.API_KEY }}'
            else
              curl -v -f -X POST 'https://${{ secrets.API_HOST }}/reconcile' -H 'Authorization: Bearer ${{ secrets.API_KEY }}'
            fi
            exit
