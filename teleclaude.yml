business:
  publishes:
    - infra

# Checkpoint maintenance overlay (ProjectConfig.checkpoint).
# Merged on top of the platform-universal base, which already covers
# Makefile -> make install, docs/** -> telec sync, agents/** -> sync + reload-self,
# and changed code -> test + log-check. This overlay adds itsUP's own surfaces:
#   - code scope: the project's source roots (every language/file type — .py, .sh,
#     etc.), by directory, so a source change owes the base test + log-check + the
#     commit-obligation/integrator maintenance. Not an extension filter; not tests.
#   - validate: changing a deployment input (a tpl/*.j2 template that
#     generates the compose/traefik artifacts) owes `itsup validate` — a config check
#     with no rollout, distinct from the deploy path (make install-runtime / itsup apply).
#   - bindings: pyproject.toml/uv.lock (the uv dependency manifest) owes the base
#     `install` action (make install -> uv sync), the same way the base binds its
#     own manifests.
checkpoint:
  actions:
    validate:
      run: itsup validate
      evidence:
        - itsup validate
      precedence: 50
  code:
    scope:
      include:
        - lib/**
        - api/**
        - commands/**
        - itsup/**
        - bin/**
        - monitor/**
      exclude:
        - tests/**
        - '**/*_test.py'
  bindings:
    - scope:
        include:
          - tpl/**
      actions:
        - validate
    - scope:
        include:
          - pyproject.toml
          - uv.lock
      actions:
        - install
